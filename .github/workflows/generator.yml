name: ProFlow News Bot 2026

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generar Noticia con Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cat << 'EOF' > news-script.cjs
          const fs = require('fs');

          async function run() {
            try {
              const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${process.env.GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: 'Genera una noticia técnica de marzo 2026 sobre hardware en Costa Rica. Devuelve SOLO formato Markdown con frontmatter: --- title: "Titulo" fecha: "2026-03-25" layout: "../../layouts/Layout.astro" --- y contenido.' }] }]
                })
              });
              
              const data = await resp.json();
              const content = data.candidates[0].content.parts[0].text;
              
              const fileName = `src/pages/herramientas/noticia-${Date.now()}.md`;
              fs.writeFileSync(fileName, content);
              console.log('Noticia creada: ' + fileName);
            } catch (err) {
              console.error('Error:', err);
              process.exit(1);
            }
          }
          run();
          EOF
          node news-script.cjs

      - name: Commit y Push de la noticia
        run: |
          git config --global user.name 'ProFlow-Bot'
          git config --global user.email 'bot@proflow.ia'
          git add .
          # Solo hacer commit si hay archivos nuevos para evitar errores
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Bot: Nueva noticia detectada" && git push)
